/* ============ 页面切换 ============ */
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  
  document.querySelectorAll('.nav-sub').forEach(n => {
    n.classList.remove('bg-accent', 'text-foreground');
    n.classList.add('text-muted-foreground');
  });
  const nav = document.getElementById('nav-' + page);
  if (nav) {
    nav.classList.add('bg-accent', 'text-foreground');
    nav.classList.remove('text-muted-foreground');
  }
  
  if (page === 'home') {
    renderHome();
  }
}

function handleGlobalShortcut(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    // 只在首页生效
    const homePage = document.getElementById('page-home');
    if (homePage && homePage.classList.contains('hidden')) return;
    
    e.preventDefault();
    const nlPanel = document.getElementById('nlPanel');
    if (nlPanel && nlPanel.classList.contains('hidden')) {
      toggleNL();
      setTimeout(() => document.getElementById('nlInput')?.focus(), 100);
    } else if (nlPanel) {
      document.getElementById('nlInput')?.focus();
    }
  }
}

function toggleNL() {
  const panel = document.getElementById('nlPanel');
  const chevron = document.getElementById('nlChevron');
  if (panel.classList.contains('hidden')) {
    panel.classList.remove('hidden');
    chevron.style.transform = 'rotate(180deg)';
  } else {
    panel.classList.add('hidden');
    chevron.style.transform = 'rotate(0deg)';
  }
}

function useExample(i) {
  currentInput = EXAMPLES[i];
  // 确保面板已展开

  if (panel && panel.classList.contains('hidden')) {
    toggleNL();
  }
  setTimeout(() => {
    const input = document.getElementById('nlInput');
    if (input) {
      input.value = currentInput;
      input.focus();
    }
    document.getElementById('btnGenerate').disabled = false;

function generateFromNL() {
  if (!currentInput.trim()) return;

  const btn = document.getElementById('btnGenerate');
  const btnText = document.getElementById('btnGenerateText');
  btn.disabled = true;
  btnText.innerHTML = '<svg class="w-4 h-4 spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';

  selectedPlatforms.clear();
  if (/facebook|fb/i.test(currentInput)) selectedPlatforms.add('facebook');
  if (/tiktok|tt/i.test(currentInput)) selectedPlatforms.add('tiktok');
  if (/google/i.test(currentInput)) selectedPlatforms.add('google');
  if (selectedPlatforms.size === 0) selectedPlatforms = new Set(['facebook', 'tiktok']);

  if (/30天|一个月/i.test(currentInput)) dateRange = 30;
  else if (/7天|一周/i.test(currentInput)) dateRange = 7;
  else if (/90天|三个月/i.test(currentInput)) dateRange = 90;

  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  reportName = `自动报表_${dateStr}`;
  showStylePicker = true; // NL输入需要选风格
  isEditing = false;

  setTimeout(() => {
    showPreview();
  }, 500);
}

function startFromTemplate(id) {
  const template = TEMPLATES.find(t => t.id === id);
  if (!template) {
    // 尝试从用户模板中查找
    const ut = userTemplates.find(t => t.id === id);
    if (ut) { startFromUserTemplate(userTemplates.indexOf(ut)); return; }
    return;
  }
  usedTemplateIds.add(id);
  currentInput = template.name;
  selectedPlatforms = new Set(template.presetPlatforms);
  dateRange = 30;
  dateRangeMode = 'preset';
  customDateFrom = '';
  customDateTo = '';
  syncFrequency = 'daily';
  selectedDimensions = new Set(template.presetDimensions);
  selectedMetrics = new Set(template.presetMetrics);
  advancedOpen = false;
  reportStyle = template.presetStyle || 'comprehensive';
  showStylePicker = false;
  isEditing = false;
  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  reportName = `${template.name}_${dateStr}`;
  showPreview();
}

function startFromUserTemplate(idx) {
  const t = userTemplates[idx];

  currentInput = t.name;
  selectedPlatforms = new Set(t.presetPlatforms || []);

function renderPreview() {
  const metrics = [...selectedMetrics];
  const dims = [...selectedDimensions];
  const platformSummary = [...selectedPlatforms].map(id => {
    const p = PLATFORMS.find(x => x.id === id);

  const isPos = (v) => v && v.startsWith('+');

  let preview = '';

  });

  // 趋势图
  if (reportStyle === 'trend' || reportStyle === 'comprehensive') {

/* ============ 配置页 ============ */
function showConfigPage() {
  openConfigDrawer('config');
  renderConfig();
}

/* ============ 配置抽屉 ============ */
function openConfigDrawer(mode) {
  const overlay = document.getElementById('configDrawerOverlay');
  const drawer = document.getElementById('configDrawer');
  const title = document.getElementById('configDrawerTitle');
  overlay.classList.remove('hidden');
  title.innerHTML = mode === 'preview'
    ? '<span class="text-base font-semibold">报表预览</span><span class="text-xs text-muted-foreground ml-2">检查并调整自动识别的配置，或直接生成报表</span>'
    : '<span class="text-base font-semibold">确认配置</span><span class="text-xs text-muted-foreground ml-2">检查并调整自动识别的配置，或直接生成报表</span>';
  // 触发 reflow 确保动画生效
  void drawer.offsetHeight;
  drawer.classList.add('open');
}

function closeConfigDrawer() {
  const overlay = document.getElementById('configDrawerOverlay');
  const drawer = document.getElementById('configDrawer');
  const pickerOverlay = document.getElementById('pickerDrawerOverlay');
  const pickerDrawer = document.getElementById('pickerDrawer');
  drawer.classList.remove('open');
  pickerDrawer.classList.remove('open');
  overlay.classList.add('hidden');
  pickerOverlay.classList.add('hidden');
}

function openPickerDrawer(titleText, bodyHTML) {
  const overlay = document.getElementById('pickerDrawerOverlay');
  const drawer = document.getElementById('pickerDrawer');
  document.getElementById('pickerDrawerTitle').innerHTML = titleText;
  document.getElementById('pickerDrawerContent').innerHTML = bodyHTML;
  overlay.classList.remove('hidden');
  void drawer.offsetHeight;
  drawer.classList.add('open');
}

function closePickerDrawer() {
  const overlay = document.getElementById('pickerDrawerOverlay');
  const drawer = document.getElementById('pickerDrawer');
  drawer.classList.remove('open');
  overlay.classList.add('hidden');
  _pickerState = null;
}

function openAccountConfigModal() {
  const items = [];
  const allSelected = new Set();
  [...selectedPlatforms].forEach(platformId => {
    const p = PLATFORMS.find(x => x.id === platformId);
    if (!p || !p.accounts.length) return;
    p.accounts.forEach(a => {
      const statusBadge = '<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium ' + (a.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600') + '">' + (a.status === 'active' ? '正常' : '已暂停') + '</span>';
      const meta = statusBadge + ' <span class="font-mono text-[10px]">' + a.id + '</span>';
      items.push({ id: a.id, name: a.name, category: p.name, meta: meta });
    });
    const sel = selectedAccounts[platformId] || new Set();
    sel.forEach(id => allSelected.add(id));
  });
  showPickerModal({
    title: '选择具体账户',
    subtitle: '从已连接平台中筛选账户',
    items: items,
    selectedIds: allSelected,
    onApply: (newSet) => {
      // 按平台重新分配
      [...selectedPlatforms].forEach(platformId => {
        const p = PLATFORMS.find(x => x.id === platformId);
        if (!p) return;
        selectedAccounts[platformId] = new Set(p.accounts.filter(a => newSet.has(a.id)).map(a => a.id));
      });
      renderConfig();
    }
  });
}

function togglePlatformInModal(id) {
  const p = PLATFORMS.find(x => x.id === id);
  // 未授权的平台：跳转到授权页（如果嵌入 index.html 则通过父窗口打开 OAuth）
  if (p && !p.connected) {
    const inIframe = (function() { try { return window.self !== window.top; } catch (e) { return true; } })();
    if (inIframe) {
      try {
        window.parent.postMessage({ type: 'creatiads-open-oauth', platformKey: id }, '*');
      } catch (e) { /* 安全兜底 */ }
      closePickerDrawer();
    } else {
      // 独立打开 simplified-v2.html 时给个提示，避免静默失败
      alert('请在 Creatiads 中打开此页面以完成 ' + p.name + ' 授权');
    }
    return;
  }
  if (selectedPlatforms.has(id)) {
    selectedPlatforms.delete(id);
    delete selectedAccounts[id];
    delete platformDimensions[id];
    delete platformMetrics[id];
  } else {
    selectedPlatforms.add(id);
    // 默认全选所有有效账户
    if (p) {
      selectedAccounts[id] = new Set(p.accounts.filter(a => a.status === 'active').map(a => a.id));
    }
  }
  openPlatformModal();
}

/* ============ 双栏 Picker Modal ============ */
let _pickerState = null;

function showPickerModal(config) {
  _pickerState = {
    items: config.items,
    selected: config.selectedIds,
    onApply: config.onApply,
    search: ''
  };
  const titleHTML = '<span class="text-base font-semibold">' + config.title + '</span><div class="text-xs font-normal text-muted-foreground mt-0.5">' + config.subtitle + '</div>';
  document.getElementById('pickerDrawerTitle').innerHTML = titleHTML;
  renderPickerBody();
  document.getElementById('pickerDrawerOverlay').classList.remove('hidden');
  const pickerDrawer = document.getElementById('pickerDrawer');
  void pickerDrawer.offsetHeight;
  pickerDrawer.classList.add('open');
}

function renderPickerBody() {
  if (!_pickerState) return;
  const { items, selected, search } = _pickerState;
  const grouped = {};
  items.forEach(it => { (grouped[it.category] = grouped[it.category] || []).push(it); });
  const q = search.toLowerCase();

  // 计算全局选中数（仅当前可见项纳入"全选"语义，搜索状态下也合理）
  const visibleItems = q
    ? items.filter(it => it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q))
    : items;
  const visSelCount = visibleItems.filter(it => selected.has(it.id)).length;
  const allVisSelected = visibleItems.length > 0 && visSelCount === visibleItems.length;
  const noneSelected = visSelCount === 0;

  let leftHtml = '<div class="mb-2 flex items-center gap-2"><div class="flex-1"><input type="text" value="' + search.replace(/"/g,'&quot;') + '" oninput="_pickerState.search=this.value;renderPickerBody();" placeholder="搜索..." class="w-full px-3 py-2 border border-border rounded-md text-sm bg-background focus:outline-none focus:ring-1 focus:ring-ring"></div></div>';

  // 顶部全局操作栏
  leftHtml += '<div class="mb-2 flex items-center gap-2 px-1 text-xs text-muted-foreground">';
  leftHtml += '<button onclick="pickerSelectAll(true)" class="hover:text-foreground transition" ' + (allVisSelected ? 'disabled' : '') + '>全选</button>';
  leftHtml += '<span class="text-border">·</span>';
  leftHtml += '<button onclick="pickerSelectAll(false)" class="hover:text-foreground transition" ' + (noneSelected ? 'disabled' : '') + '>取消全选</button>';
  leftHtml += '<span class="text-border">·</span>';
  leftHtml += '<button onclick="pickerInvertSelection()" class="hover:text-foreground transition">反选</button>';
  leftHtml += '<span class="ml-auto">' + visSelCount + ' / ' + visibleItems.length + '</span>';
  leftHtml += '</div>';

  leftHtml += '<div class="overflow-y-auto scrollable" style="max-height:calc(60vh - 140px);">';
  Object.entries(grouped).forEach(([cat, list]) => {
    const filtered = q ? list.filter(it => it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)) : list;
    if (filtered.length === 0) return;
    const groupSelCount = filtered.filter(it => selected.has(it.id)).length;
    const groupAllSel = filtered.length > 0 && groupSelCount === filtered.length;
    const catEsc = cat.replace(/'/g,"\\'");
    leftHtml += '<div class="mb-2"><div class="flex items-center justify-between px-1 py-1 text-xs font-medium"><span class="text-foreground">' + cat + '</span><div class="flex items-center gap-1.5 text-muted-foreground"><button onclick="pickerSelectGroup(\'' + catEsc + '\',' + (!groupAllSel) + ')" class="hover:text-foreground transition">' + (groupAllSel ? '取消' : '全选') + '</button><span>' + groupSelCount + '/' + filtered.length + '</span></div></div>';
    filtered.forEach(it => {
      const checked = selected.has(it.id) ? 'checked' : '';
      const idEsc = it.id.replace(/'/g,"\\'");
      const metaHtml = it.meta ? '<span class="text-xs text-muted-foreground ml-2 flex-shrink-0">' + it.meta + '</span>' : '';
      leftHtml += '<label class="flex items-center gap-2.5 px-2 py-1.5 rounded-md hover:bg-accent transition cursor-pointer"><input type="checkbox" ' + checked + ' onchange="pickerToggle(\'' + idEsc + '\')" class="accent-foreground flex-shrink-0"><span class="text-sm flex-1 min-w-0 truncate">' + it.name + '</span>' + metaHtml + '</label>';
    });
    leftHtml += '</div>';
  });
  if (visibleItems.length === 0) {
    leftHtml += '<div class="text-center text-xs text-muted-foreground py-8">无匹配结果</div>';
  }
  leftHtml += '</div>';

  // 右侧已选
  let rightHtml = '<div class="flex items-center justify-between mb-2"><span class="text-xs font-medium text-muted-foreground">已选 ' + selected.size + '</span>';
  if (selected.size > 0) {
    rightHtml += '<button onclick="pickerClearAll()" class="text-xs text-muted-foreground hover:text-foreground transition">清空</button>';
  }
  rightHtml += '</div>';
  rightHtml += '<div class="overflow-y-auto scrollable flex flex-col gap-0.5" style="max-height:calc(60vh - 100px);">';
  if (selected.size === 0) {
    rightHtml += '<div class="text-center text-xs text-muted-foreground py-6">暂未选择</div>';
  } else {
    selected.forEach(id => {
      const it = items.find(x => x.id === id);
      const label = it ? it.name : id;
      const idEsc = id.replace(/'/g,"\\'");
      rightHtml += '<div class="flex items-center justify-between px-2 py-1.5 bg-secondary/50 rounded-md text-sm"><span class="truncate flex-1">' + label + '</span><button onclick="pickerRemove(\'' + idEsc + '\')" class="ml-2 text-muted-foreground hover:text-foreground flex-shrink-0"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>';
    });
  }
  rightHtml += '</div>';

  document.getElementById('pickerDrawerContent').innerHTML = '<div class="flex gap-4 h-full" style="min-height:300px;"><div class="flex-1 flex flex-col">' + leftHtml + '</div><div class="w-[170px] flex-shrink-0 border-l border-border pl-4 flex flex-col">' + rightHtml + '</div></div>';
  document.getElementById('pickerDrawerFooter').innerHTML = '<button onclick="closePickerDrawer()" class="inline-flex items-center px-4 h-9 text-sm rounded-md border border-border bg-background hover:bg-accent transition">取消</button><button onclick="applyPicker()" class="inline-flex items-center px-4 h-9 text-sm rounded-md bg-foreground text-background hover:bg-foreground/90 transition font-medium">应用</button>';
}

function pickerToggle(id) {
  if (!_pickerState) return;
  if (_pickerState.selected.has(id)) _pickerState.selected.delete(id);
  else _pickerState.selected.add(id);
  renderPickerBody();
}

function pickerRemove(id) {
  if (!_pickerState) return;
  _pickerState.selected.delete(id);
  renderPickerBody();
}

function pickerSelectAll(select) {
  if (!_pickerState) return;
  const { items, search } = _pickerState;
  const q = search.toLowerCase();
  const visible = q ? items.filter(it => it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)) : items;
  if (select) {
    visible.forEach(it => _pickerState.selected.add(it.id));
  } else {
    visible.forEach(it => _pickerState.selected.delete(it.id));
  }
  renderPickerBody();
}

function pickerInvertSelection() {
  if (!_pickerState) return;
  const { items, search } = _pickerState;
  const q = search.toLowerCase();
  const visible = q ? items.filter(it => it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)) : items;
  visible.forEach(it => {
    if (_pickerState.selected.has(it.id)) _pickerState.selected.delete(it.id);
    else _pickerState.selected.add(it.id);
  });
  renderPickerBody();
}

function pickerSelectGroup(category, select) {
  if (!_pickerState) return;
  const { items, search } = _pickerState;
  const q = search.toLowerCase();
  const groupItems = items.filter(it => it.category === category);
  const visible = q ? groupItems.filter(it => it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)) : groupItems;
  if (select) {
    visible.forEach(it => _pickerState.selected.add(it.id));
  } else {
    visible.forEach(it => _pickerState.selected.delete(it.id));
  }
  renderPickerBody();
}

function pickerClearAll() {
  if (!_pickerState) return;
  _pickerState.selected.clear();
  renderPickerBody();
}

function applyPicker() {
  if (_pickerState && _pickerState.onApply) {
    _pickerState.onApply(_pickerState.selected);
  }
  _pickerState = null;
  closePickerDrawer();
}

function showModal(title, bodyHTML, onClose) {
  const modal = document.getElementById('modal');
  modal.querySelector('#modalTitle').textContent = title;
  modal.querySelector('#modalBody').innerHTML = bodyHTML;
  modal.style.display = 'flex';
  modal._onClose = onClose;
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.style.display = 'none';
  if (modal._onClose) modal._onClose();
  // Reset footer and width
  document.getElementById('modalFoot').innerHTML = `<button onclick="closeModal()" class="inline-flex items-center px-4 h-9 text-sm rounded-md border border-border bg-background hover:bg-accent transition">关闭</button>`;
  document.getElementById('modalInner').style.width = '480px';
  _pickerState = null;
}

/* ============ 生成报表 ============ */

  setTimeout(() => {
    const platformNames = [...selectedPlatforms].map(id => {
      const p = PLATFORMS.find(x => x.id === id);
      const count = selectedAccounts[id] ? selectedAccounts[id].size : 0;
      return `${p.name}（${count}个账户）`;
    }).join('、');
    showModal('报表已生成', `
      <div class="w-12 h-12 bg-secondary rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3 class="text-base font-semibold tracking-tight text-center mb-1">${reportName}</h3>
      <p class="text-sm text-muted-foreground text-center mb-5">系统已自动完成数据源连接、字段配置、数据集创建和报表生成</p>
      <div class="border border-border rounded-md p-3 text-sm space-y-2">
        <div class="flex justify-between"><span class="text-muted-foreground">数据源</span><span class="font-medium">${platformNames}</span></div>
        <div class="flex justify-between"><span class="text-muted-foreground">时间范围</span><span class="font-medium">${dateRangeMode==='custom' ? (customDateFrom||'起始') + ' 至 ' + (customDateTo||'至今') : '最近 '+dateRange+' 天'}</span></div>
        <div class="flex justify-between"><span class="text-muted-foreground">同步频率</span><span class="font-medium">${{'hourly':'每小时','daily':'每日 00:00（推荐）','weekly':'每周'}[syncFrequency]}</span></div>
        <div class="flex justify-between"><span class="text-muted-foreground">报表风格</span><span class="font-medium">${{'trend':'趋势追踪','comparison':'对比分析','detail':'明细报表','comprehensive':'综合仪表盘'}[reportStyle]}</span></div>
        <div class="flex justify-between"><span class="text-muted-foreground">通用维度 / 指标</span><span class="font-medium">${selectedDimensions.size} / ${selectedMetrics.size}</span></div>
        ${(() => {
          let platformSpecificCount = 0;
          let platformDimCount = 0;
          let platformMetCount = 0;
          Object.values(platformDimensions).forEach(s => platformDimCount += s.size);
          Object.values(platformMetrics).forEach(s => platformMetCount += s.size);
          if (platformDimCount > 0 || platformMetCount > 0) {
            return `<div class="flex justify-between"><span class="text-muted-foreground">平台专属维度 / 指标</span><span class="font-medium">${platformDimCount} / ${platformMetCount}</span></div>`;
          }
          return '';
        })()}
        <div class="flex justify-between"><span class="text-muted-foreground">首次同步</span><span class="font-medium">已开始 · 预计 2 分钟</span></div>
      </div>
    `);
    
    // 自定义底部按钮
    document.getElementById('modalFoot').innerHTML = `
      <button onclick="closeModal(); showPage('home');" class="flex-1 inline-flex items-center justify-center px-4 h-9 text-sm rounded-md border border-border bg-background hover:bg-accent transition">继续创建</button>
      <button onclick="closeModal(); showDashboard();" class="flex-1 inline-flex items-center justify-center px-4 h-9 text-sm font-medium rounded-md bg-primary text-primary-foreground hover:bg-primary/90 transition">查看 Dashboard</button>
    `;
    
    btn.disabled = false;
    btnText.textContent = '生成报表';
  }, 800);
}

/* ============ 历史报表（抽屉） ============ */
function openHistoryDrawer() {
  const html = HISTORY_REPORTS.length > 0 ? `
    <div class="space-y-2">
      ${HISTORY_REPORTS.map((r, idx) => `
        <div class="bg-card border border-border rounded-lg p-3 hover:border-foreground/30 transition">
          <div class="text-sm font-medium mb-1">${r.name}</div>
          <div class="text-xs text-muted-foreground mb-1">${r.scenario}</div>
          <div class="text-[11px] text-muted-foreground mb-2">${r.sources} · ${r.updated}</div>
          <div class="flex gap-2 pt-2 border-t border-border">
            <button onclick="editReport(${idx})" class="text-xs font-medium px-2.5 h-7 inline-flex items-center rounded-md border border-border hover:bg-accent transition">
              <svg class="w-3 h-3 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="m18.5 2.5 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              编辑配置
            </button>
            <button onclick="viewReport(${idx})" class="text-xs font-medium px-2.5 h-7 inline-flex items-center rounded-md border border-border hover:bg-accent transition">
              <svg class="w-3 h-3 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              查看
            </button>
          </div>
        </div>
      `).join('')}
    </div>
  ` : `
    <div class="text-center py-12">
      <div class="text-sm text-muted-foreground mb-3">还没有生成任何报表</div>
    </div>
  `;
  document.getElementById('historyDrawerContent').innerHTML = html;
  document.getElementById('historyDrawerOverlay').classList.remove('hidden');
  const drawer = document.getElementById('historyDrawer');
  drawer.classList.remove('translate-x-full');
}

function closeHistoryDrawer() {
  document.getElementById('historyDrawerOverlay').classList.add('hidden');
  document.getElementById('historyDrawer').classList.add('translate-x-full');
}

function editReport(idx) {
  const r = HISTORY_REPORTS[idx];
  const template = TEMPLATES.find(t => t.id === r.templateId);
  if (template) {
    currentInput = r.name;
    reportName = r.name;
    selectedPlatforms = new Set(template.presetPlatforms);
    [...selectedPlatforms].forEach(id => {
      const p = PLATFORMS.find(x => x.id === id);
      if (p) selectedAccounts[id] = new Set(p.accounts.filter(a => a.status === 'active').map(a => a.id));
    });
    dateRange = 30;
    dateRangeMode = 'preset';
    syncFrequency = 'daily';
    selectedDimensions = new Set(template.presetDimensions);
    selectedMetrics = new Set(template.presetMetrics);
    reportStyle = template.presetStyle || 'comprehensive';
    showStylePicker = false;
    isEditing = true; // 二次编辑模式
    advancedOpen = true;
    platformAdvancedOpen = false;
    platformDimensions = {};
    platformMetrics = {};
    closeHistoryDrawer();
    showConfigPage();
  }
}

/* ============ 初始化 ============ */
// 初始默认选中所有有效账户
;[...selectedPlatforms].forEach(id => {
  const p = PLATFORMS.find(x => x.id === id);
  if (p) selectedAccounts[id] = new Set(p.accounts.filter(a => a.status === 'active').map(a => a.id));
});

/* ============ Dashboard 跳转（通知父窗口） ============ */
function showDashboard(config) {
  const c = config || {};
  const reportConfig = {
    name: c.name || reportName || '未命名报表',
    style: c.style || reportStyle || 'comprehensive',
    metrics: c.metrics || [...selectedMetrics],
    dimensions: c.dimensions || [...selectedDimensions],
    platforms: c.platforms || [...selectedPlatforms].map(id => { const p = PLATFORMS.find(x=>x.id===id); return p ? p.name : id; }),
    dateRange: c.dateRange || (dateRangeMode === 'custom' ? (customDateFrom||'起始') + ' 至 ' + (customDateTo||'至今') : '最近 ' + dateRange + ' 天'),
    syncFrequency: c.syncFrequency || syncFrequency
  };
  const inIframe = (function() { try { return window.self !== window.top; } catch(e) { return true; } })();
  if (inIframe) {
    try { window.parent.postMessage({ type: 'creatiads-show-report', report: reportConfig }, '*'); } catch(e) {}
  } else {
    // 独立打开时直接渲染内部 dashboard
    renderInternalDashboard(reportConfig);
  }
}

function renderInternalDashboard(config) {
  const page = document.getElementById('page-dashboard');
  const mockValues = {'展示量 Impressions':'2.4M','点击量 Clicks':'76.8K','花费 Cost':'¥128.5K','点击率 CTR':'3.2%','平均点击成本 Avg.CPC':'¥2.8','平均千次展示成本 Avg.CPM':'¥18.6','转化量 Conversions':'1,847','每次转化费用 Cost/Conv.':'¥69.5','视频25%播放 Video P25':'68.4%','视频50%播放 Video P50':'52.1%','视频75%播放 Video P75':'38.6%','视频完播 Video P100':'24.3%','平均观看时长 Avg.Watch Time':'12.8s'};
  const mockChanges = {'展示量 Impressions':'+8.7%','点击量 Clicks':'+6.4%','花费 Cost':'+12.3%','点击率 CTR':'-0.3%','平均点击成本 Avg.CPC':'-5.1%','平均千次展示成本 Avg.CPM':'+3.2%','转化量 Conversions':'+15.2%','每次转化费用 Cost/Conv.':'-8.4%','视频25%播放 Video P25':'+4.2%','视频50%播放 Video P50':'+2.8%','视频75%播放 Video P75':'+1.5%','视频完播 Video P100':'+0.9%','平均观看时长 Avg.Watch Time':'+1.2s'};
  function isPos(v) { return v && v.startsWith('+'); }
  const metrics = config.metrics || [];

  let body = '<div class="p-6"><button onclick="showPage(\'home\')" class="text-xs text-muted-foreground hover:text-foreground inline-flex items-center gap-1 mb-3"><svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>返回</button>';
  body += '<h1 class="text-xl font-bold mb-1">' + config.name + '</h1>';
  body += '<div class="text-xs text-muted-foreground mb-4">' + (config.platforms||[]).join(', ') + ' · ' + config.dateRange + '</div>';
  body += '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">';
  metrics.slice(0,8).forEach(m => { body += '<div class="bg-card border border-border rounded-lg p-4"><div class="text-xs text-muted-foreground truncate">' + m + '</div><div class="text-xl font-bold mt-1">' + (mockValues[m]||'--') + '</div><div class="text-xs mt-0.5 ' + (isPos(mockChanges[m])?'text-green-600':'text-red-500') + '">' + (mockChanges[m]||'') + '</div></div>'; });
  body += '</div><div class="text-center text-sm text-muted-foreground py-8">（独立模式 Dashboard 演示）</div></div>';
  page.innerHTML = body;
  showPage('dashboard');
}

function viewReport(idx) {
  const r = HISTORY_REPORTS[idx];
  const template = TEMPLATES.find(t => t.id === r.templateId);
  closeHistoryDrawer();
  showDashboard({
    name: r.name,
    style: template ? template.presetStyle : 'comprehensive',
    metrics: template ? template.presetMetrics : [...selectedMetrics],
    dimensions: template ? template.presetDimensions : [...selectedDimensions],
    platforms: r.sources.split(', '),
    dateRange: '最近 30 天',
    syncFrequency: 'daily'
  });
}
